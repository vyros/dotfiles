# ============================================================
# GÉNÉRAL
# ============================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
set -g mouse on
set -g bell-action none
set -g visual-bell off

# ============================================================
# COULEURS (true color)
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides "*:Ss=\E[%p1%d q:Se=\E[2 q"

# ============================================================
# FENÊTRES & PANNEAUX
# ============================================================
# recharger la config
bind r source-file ~/.tmux.conf \; display "Config rechargée"

# splits — conserve le répertoire courant
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# nouvelle fenêtre dans le répertoire courant
bind c new-window -c "#{pane_current_path}"

# navigation panneaux (Alt+hjkl, sans préfixe)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# navigation fenêtres (Alt+p/n, sans préfixe)
bind -n M-p previous-window
bind -n M-n next-window

# redimensionnement panneaux (préfixe + HJKL)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# synchroniser tous les panneaux
bind y setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"

# terminal flottant (popup 80x80%)
bind C-g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

# ============================================================
# MODE COPIE (vi)
# ============================================================
setw -g mode-keys vi
unbind [
bind Escape copy-mode

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

bind P paste-buffer
bind b choose-buffer
bind + delete-buffer \; display "Buffer supprimé"

bind > run-shell 'tmux show-buffer | xclip -in -selection clipboard' \
    \; display "Copié dans le presse-papier système"
bind < run-shell 'tmux set-buffer -- "$(xclip -out -selection clipboard)"' \
    \; display "Collé depuis le presse-papier système"

bind-key -T choice-mode-vi h send-keys -X tree-collapse
bind-key -T choice-mode-vi l send-keys -X tree-expand
bind-key -T choice-mode-vi H send-keys -X tree-collapse-all
bind-key -T choice-mode-vi L send-keys -X tree-expand-all

# ============================================================
# STATUS BAR — Gruvbox dark
# ============================================================
set -g status on
set -g status-position bottom
set -g status-style "bg=#282828,fg=#ebdbb2"

# Gauche : nom de session
set -g status-left-length 30
set -g status-left "#[bg=#98971a,fg=#282828,bold] #S #[bg=#282828,fg=#98971a] "

# Droite : branche git + date/heure
set -g status-right-length 80
set -g status-right "#[fg=#504945]│ #[fg=#83a598]#{?#{!=:#{b:pane_current_path},},#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/^ */ /'),} #[fg=#504945]│ #[fg=#a89984]%Y-%m-%d #[fg=#d79921,bold]%H:%M "

# Fenêtres inactives
setw -g window-status-style "bg=#282828,fg=#a89984"
setw -g window-status-format " #I:#W#{?window_zoomed_flag, Z,} "

# Fenêtre active
setw -g window-status-current-style "bg=#282828,fg=#d79921,bold"
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, Z,} "

# Fenêtre avec activité
setw -g window-status-activity-style "bg=#282828,fg=#d65d0e"
setw -g monitor-activity on

# Bordures de panneaux
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#d79921"

# Messages
set -g message-style "bg=#d79921,fg=#282828,bold"
set -g message-command-style "bg=#3c3836,fg=#ebdbb2"

# Mode copie
setw -g mode-style "bg=#d79921,fg=#282828"

# ============================================================
# ALIAS DE COMMANDES — layouts mux (C-a : mux <nom>)
# ============================================================
set -g command-alias 'mux=run-shell "bash $HOME/.config/tmux/mux.sh %1"'

# ============================================================
# PLUGINS (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # C-a C-s sauvegarder / C-a C-r restaurer
set -g @plugin 'tmux-plugins/tmux-continuum'    # sauvegarde automatique toutes les 15 min

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'

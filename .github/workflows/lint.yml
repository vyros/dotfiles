name: lint

on: [push, pull_request]

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer les linters
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck fish

      - name: shellcheck (scripts bash/sh)
        run: find . -name '*.sh' -print0 | xargs -0 -r shellcheck -S warning

      - name: fish -n (config fish)
        run: find . -name '*.fish' -print0 | xargs -0 -r -I{} fish -n {}
